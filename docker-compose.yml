services:
  db:
    image: mysql:8.2
    container_name: diana-mysql
    ports:
      - 33160:3306
    volumes:
      - diana-db:/var/lib/mysql
      - ./scripts/db/:/docker-entrypoint-initdb.d/:ro
    environment:
      - TZ=Europe/Paris
      - MYSQL_DATABASE=diana
      - MYSQL_USER=diana-user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=root
      - DEFAULT_AUTHENTICATION_PLUGIN=mysql_native_password
    restart: unless-stopped

  back:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile.dev
    container_name: diana-back
    ports:
      - 3100:3000
      - 9329:9229
    env_file:
      - ./apps/backend/.env
    volumes:
      - .:/app
      - diana-node-modules:/app/node_modules
    working_dir: /app
    depends_on:
      - db
    command: sh -lc "yarn install && yarn workspace backend start:dev"

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile.dev
    container_name: diana-front
    ports:
      - 5273:5273
    volumes:
      - .:/app
      - diana-node-modules:/app/node_modules
    working_dir: /app
    restart: on-failure:3
    command: sh -lc "yarn install && yarn workspace frontend dev"

volumes:
  diana-db:
  diana-node-modules:

